<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر أواني الخير | أواني منزلية راقية</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Amiri:wght@700&family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* التنسيقات العامة */
        body { 
            margin: 0; 
            padding: 0; 
            font-family: 'Cairo', 'Poppins', sans-serif; 
            background-color: #FFFBEB; 
            color: #1F2937; 
            overflow-x: hidden; 
        }

        /* --- القائمة الجانبية (Sidebar) --- */
        .sidebar {
            height: 100%;
            width: 0;
            position: fixed;
            z-index: 4000;
            top: 0;
            right: 0;
            background-color: #ffffff;
            overflow-x: hidden;
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            padding-top: 60px;
            box-shadow: -5px 0 25px rgba(0,0,0,0.15);
        }
        .sidebar-header {
            padding: 25px;
            background: #D97706;
            color: white;
            text-align: center;
            margin-top: -60px;
        }
        .sidebar a, .dropdown-btn {
            padding: 15px 30px;
            text-decoration: none;
            font-size: 18px;
            color: #1F2937;
            display: block;
            border-bottom: 1px solid #f3f4f6;
            transition: 0.3s;
            cursor: pointer;
            width: 100%;
            text-align: right;
            border-left: none; border-right: none; background: none;
            font-family: 'Cairo';
        }
        .sidebar a:hover, .dropdown-btn:hover { background-color: #FFFBEB; color: #D97706; padding-right: 40px; }
        
        .dropdown-container {
            display: none;
            background-color: #f9fafb;
            padding-right: 20px;
        }
        .dropdown-container a { font-size: 16px; border-bottom: 0.5px solid #eee; }

        .sidebar .closebtn { position: absolute; top: 15px; left: 25px; font-size: 36px; cursor: pointer; color: #1F2937; }

        .admin-gate {
            padding: 25px;
            background: #f9fafb;
            margin-top: 30px;
            border-top: 2px solid #D97706;
        }
        .admin-gate input {
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
        }
        .admin-gate button {
            width: 100%;
            background: #1F2937;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        .overlay {
            display: none;
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0; left: 0;
            background: rgba(0,0,0,0.5);
            z-index: 3999;
            backdrop-filter: blur(3px);
        }

        /* --- Header Section --- */
        .main-header {
            position: sticky;
            top: 0;
            width: 100%;
            background-color: #ffffff;
            border-bottom: 3px solid #D97706;
            z-index: 2000;
            padding: 15px 0;
        }
        .header-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
        }
        .header-left { display: flex; align-items: center; gap: 20px; flex: 1; }
        .menu-toggle { background: none; border: none; font-size: 26px; cursor: pointer; color: #1F2937; }

        .brand-name-arabic {
            font-family: 'Amiri', serif;
            font-size: 38px;
            color: #D97706;
            margin: 0;
            line-height: 1;
            font-weight: 700;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.05);
            white-space: nowrap;
        }

        .header-center { flex: 2; display: flex; justify-content: center; }
        .search-box {
            display: flex;
            align-items: center;
            background-color: #f3f4f6;
            border-radius: 50px;
            padding: 10px 25px;
            width: 100%;
            max-width: 600px;
            border: 1px solid #e5e7eb;
        }
        .search-box input { background: transparent; border: none; outline: none; width: 100%; font-size: 15px; text-align: right; font-family: 'Cairo'; }
        .search-btn { background: none; border: none; font-size: 16px; color: #D97706; cursor: pointer; }

        .header-right { display: flex; align-items: center; justify-content: flex-end; gap: 25px; flex: 1; }
        .icon-link { text-decoration: none; color: #1F2937; font-size: 22px; transition: 0.2s; }
        .cart-icon { 
            background-color: #D97706; 
            color: #fff !important; 
            width: 45px; height: 45px; 
            border-radius: 50%; 
            display: flex; justify-content: center; align-items: center; 
        }

        /* --- Product Grid --- */
        .container { padding: 40px 20px; max-width: 1300px; margin: 0 auto; }
        .category-title { color: #D97706; margin-bottom: 25px; border-right: 5px solid #D97706; padding-right: 15px; font-size: 24px; }
        .product-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 30px; 
        }
        .product {
            background: #ffffff;
            padding: 25px;
            border-radius: 20px;
            text-align: center;
            transition: 0.3s;
            border: 1px solid #f3f4f6;
        }
        .product:hover { transform: translateY(-10px); box-shadow: 0 20px 40px rgba(217,119,6,0.1); border-color: #D97706; }
        .product img { width: 100%; height: 200px; object-fit: contain; margin-bottom: 15px; }
        
        .product .product-price-grid { 
            color: #D97706; 
            font-weight: 800; 
            font-size: 22px; 
            margin-bottom: 15px; 
        }

        /* --- زر عرض التفاصيل الجديد --- */
        .details-btn {
            background: #1F2937;
            color: #fff;
            border: none;
            padding: 12px;
            border-radius: 50px;
            width: 100%;
            cursor: pointer;
            font-family: 'Cairo';
            font-weight: 600;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .details-btn:hover {
            background: #D97706;
            transform: scale(1.03);
            box-shadow: 0 6px 15px rgba(217,119,6,0.3);
        }

        .details-btn:active {
            transform: scale(0.98);
        }

        /* --- Modal Popup --- */
        .modal {
            display: none;
            position: fixed;
            z-index: 5000;
            left: 0; top: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.7);
            backdrop-filter: blur(5px);
            overflow-y: auto;
        }
        .modal-content {
            background-color: #fff;
            margin: 2% auto;
            width: 90%;
            max-width: 950px;
            border-radius: 25px;
            position: relative;
            animation: popIn 0.4s ease;
            overflow: hidden;
        }
        @keyframes popIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .modal-body { display: flex; flex-direction: row-reverse; }
        .modal-image-area { flex: 1.1; padding: 20px; display: flex; align-items: center; justify-content: center; position: relative; }
        #modalImg { width: 100%; max-height: 450px; object-fit: contain; border-radius: 15px; }
        .modal-info { flex: 0.9; padding: 40px; text-align: right; display: flex; flex-direction: column; }
        .modal-info h2 { font-size: 28px; margin-top: 0; }
        
        .modal-price { 
            font-size: 32px; 
            color: #D97706; 
            font-weight: 800; 
            margin-bottom: 15px; 
        }
        
        .modal-description { line-height: 1.8; color: #444; margin-bottom: 25px; }
        .wa-btn {
            background: #25D366; color: white; padding: 15px; border-radius: 50px; 
            text-decoration: none; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 10px;
            transition: 0.3s;
        }
        .wa-btn:hover { background: #1eb956; transform: translateY(-2px); }

        .img-nav { position: absolute; top: 50%; transform: translateY(-50%); background: white; border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.1); color: #D97706; }

        @media (max-width: 850px) {
            .modal-body { flex-direction: column; }
            .header-center { display: none; }
        }
    </style>
</head>
<body>

<div id="sideMenu" class="sidebar">
    <div class="sidebar-header"><h3>إكتشف مجموعتنا</h3></div>
    <span class="closebtn" onclick="toggleNav(0)">&times;</span>
    <a onclick="filterProducts('all')"><i class="fa-solid fa-house"></i> الرئيسية</a>
    
    <button class="dropdown-btn" onclick="toggleDropdown()">
        <i class="fa-solid fa-list"></i> تصنيفات المنتجات 
        <i class="fa fa-caret-down" style="margin-right: 10px;"></i>
    </button>
    <div id="catDropdown" class="dropdown-container">
        <a onclick="filterProducts('normal')"><i class="fa-solid fa-utensils"></i> أواني المطبخ </a>
        <a onclick="filterProducts('electrical')"><i class="fa-solid fa-bolt"></i> تجهيزات كهربائية </a>
    </div>

    <a href="#"><i class="fa-solid fa-tags"></i> العروض الحالية</a>
    <a href="#"><i class="fa-solid fa-info-circle"></i> عن المتجر</a>
    
    <div class="admin-gate">
        <p style="margin:0 0 10px 0; font-weight:bold; color:#D97706;">دخول المشرف</p>
        <input type="text" id="userField" placeholder="اسم المستخدم">
        <input type="password" id="passField" placeholder="كلمة المرور">
        <button onclick="checkAdmin()">دخول لوحة التحكم</button>
        <p id="err" style="color:red; font-size:12px; margin-top:5px; display:none;">خطأ في البيانات!</p>
    </div>
</div>
<div id="overlay" class="overlay" onclick="toggleNav(0)"></div>

<header class="main-header">
    <div class="header-container">
        <div class="header-left">
            <button class="menu-toggle" onclick="toggleNav(1)"><i class="fa-solid fa-bars-staggered"></i></button>
            <h1 class="brand-name-arabic">متجر أواني الخير</h1>
        </div>
        <div class="header-center">
            <div class="search-box">
                <input type="text" placeholder="ما الذي تبحث عنه لمطبخك؟">
                <button class="search-btn"><i class="fa-solid fa-magnifying-glass"></i></button>
            </div>
        </div>
        <div class="header-right">
            <a href="#" class="icon-link"><i class="fa-regular fa-heart"></i></a>
            <a href="#" class="icon-link cart-icon"><i class="fa-solid fa-cart-shopping"></i></a>
        </div>
    </div>
</header>

<div class="container">
    <h2 id="sectionTitle" class="category-title">جميع المنتجات</h2>
    <div id="storeGrid" class="product-grid">جاري تحميل أواني الخير...</div>
</div>

<div id="pModal" class="modal">
    <div class="modal-content">
        <span onclick="closePModal()" style="position:absolute; left:20px; top:15px; font-size:35px; cursor:pointer; color:#999; z-index:100;">&times;</span>
        <div class="modal-body">
            <div class="modal-image-area">
                <button class="img-nav" style="left:10px;" onclick="changeImg(-1)">&#10094;</button>
                <img id="modalImg" src="">
                <button class="img-nav" style="right:10px;" onclick="changeImg(1)">&#10095;</button>
            </div>
            <div class="modal-info">
                <h2 id="modalTitle"></h2>
                <div id="modalPrice" class="modal-price"></div>
                <div id="modalDesc" class="modal-description"></div>
                <a id="modalWa" href="" target="_blank" class="wa-btn">
                    <i class="fa-brands fa-whatsapp"></i> اطلب الآن عبر واتساب
                </a>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBbraVWA6lda9zMobQluPWy02tOZ0A8EVc",
        authDomain: "awani-alkhayr-store.firebaseapp.com",
        projectId: "awani-alkhayr-store",
        storageBucket: "awani-alkhayr-store.firebasestorage.app",
        messagingSenderId: "381565242398",
        appId: "1:381565242398:web:68e21916d12edec276b20f",
        measurementId: "G-D3R6BLKVHP",
        databaseURL: "https://awani-alkhayr-store-default-rtdb.firebaseio.com"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let storeData = [];
    let currentFilter = 'all';
    let pIdx = 0, iIdx = 0;

    onValue(ref(db, 'products'), (snapshot) => {
        const data = snapshot.val();
        storeData = data ? Object.values(data) : [];
        renderItems();
    });

    window.filterProducts = (category) => {
        currentFilter = category;
        const titles = { 'all': 'جميع المنتجات', 'normal': 'أواني المطبخ ', 'electrical': 'تجهيزات كهربائية' };
        document.getElementById('sectionTitle').innerText = titles[category];
        renderItems();
        toggleNav(0); 
    };

    function renderItems() {
        const grid = document.getElementById('storeGrid');
        
        const filteredData = currentFilter === 'all' 
            ? storeData 
            : storeData.filter(p => p.category === currentFilter);

        if(filteredData.length === 0) {
            grid.innerHTML = "<p style='text-align:center; width:100%; padding: 50px;'>لا توجد منتجات في هذا القسم حالياً.</p>";
            return;
        }

        grid.innerHTML = filteredData.map((p, i) => `
            <div class="product">
                <img src="${(p.images && p.images.length > 0) ? p.images[0] : ''}">
                <h2>${p.title}</h2>
                <div class="product-price-grid">${p.price}</div>
                <button class="details-btn" onclick="openFilteredModal('${p.title}')">عرض التفاصيل</button>
            </div>
        `).join('');
    }

    window.openFilteredModal = (title) => {
        const index = storeData.findIndex(p => p.title === title);
        if(index !== -1) window.openPModal(index);
    }

    window.toggleDropdown = () => {
        const dropdown = document.getElementById("catDropdown");
        dropdown.style.display = dropdown.style.display === "block" ? "none" : "block";
    };

    window.toggleNav = (state) => {
        document.getElementById("sideMenu").style.width = state ? "300px" : "0";
        document.getElementById("overlay").style.display = state ? "block" : "none";
    };

    window.checkAdmin = () => {
        const u = document.getElementById('userField').value;
        const p = document.getElementById('passField').value;
        if(u === "sam" && p === "123") {
            window.location.href = "admin.html";
        } else {
            document.getElementById('err').style.display = 'block';
        }
    };

    window.openPModal = (i) => {
        pIdx = i; iIdx = 0;
        const p = storeData[i];
        document.getElementById('modalTitle').innerText = p.title;
        document.getElementById('modalPrice').innerText = p.price;
        document.getElementById('modalDesc').innerHTML = p.desc;
        refreshImg();
        document.getElementById('pModal').style.display = "block";
        document.body.style.overflow = "hidden";
    };

    window.refreshImg = () => {
        const p = storeData[pIdx];
        if(p.images && p.images.length > 0) {
            document.getElementById('modalImg').src = p.images[iIdx];
        }
        const message = encodeURIComponent(`السلام عليكم، هل يمكنني الحصول على تفاصيل أكثر بخصوص هذا المنتج؟ ${p.title}`);
        document.getElementById('modalWa').href = `https://wa.me/212635264977?text=${message}`;
    };

    window.changeImg = (dir) => {
        const total = storeData[pIdx].images.length;
        iIdx = (iIdx + dir + total) % total;
        refreshImg();
    };

    window.closePModal = () => {
        document.getElementById('pModal').style.display = "none";
        document.body.style.overflow = "auto";
    };

    window.onclick = (e) => { if(e.target.id == 'pModal') closePModal(); };
</script>
</body>
</html>
